services:
  terms:
    build: .
    image: terms-persua:latest
    container_name: terms-persua
    restart: unless-stopped
    ports:
      - "8081:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
