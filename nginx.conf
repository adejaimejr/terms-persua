server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    # Compressao
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss image/svg+xml;

    # Headers de seguranca
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Cache para assets estaticos (imagens, fontes, etc)
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # URLs limpas, sem .html
    location / {
        try_files $uri $uri.html $uri/index.html =404;
    }

    # Cache curto para HTML (atualizacoes de conteudo refletem rapido)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

}
