<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}, Persua</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <link rel="canonical" href="{{URL}}">
  <link rel="icon" href="/favicon.png" type="image/png">

  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Persua">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:url" content="{{URL}}">
  <meta property="og:title" content="{{TITLE}}, Persua">
  <meta property="og:description" content="{{DESCRIPTION}}">
  <meta property="og:image" content="https://terms.persua.com.br/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="Documentos legais da Persua">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{TITLE}}, Persua">
  <meta name="twitter:description" content="{{DESCRIPTION}}">
  <meta name="twitter:image" content="https://terms.persua.com.br/og-image.png">
  <meta name="twitter:image:alt" content="Documentos legais da Persua">
  <meta name="theme-color" content="#001335">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('persua-theme');
        var theme = saved === 'dark' || saved === 'light' ? saved : 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="doc-page">
  <header class="site-header">
    <div class="container">
      <a class="brand" href="/" aria-label="Persua">
        <img class="logo logo-light" src="/logo-persua.svg" alt="Persua" height="28">
        <img class="logo logo-dark" src="/logo-persua-dark.svg" alt="Persua" height="28">
      </a>
      <button id="menu-toggle" class="menu-toggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="site-nav" title="Menu">
        <svg class="icon icon-menu" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <svg class="icon icon-close" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <nav id="site-nav" class="site-nav">
        <a href="/terms-of-use">Termos</a>
        <a href="/privacy-policy">Privacidade</a>
        <a href="/subprocessors">Subprocessadores</a>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Alternar tema claro e escuro" title="Alternar tema">
        <svg class="icon icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="container doc-toolbar">
    <a class="back-link" href="/">&larr; Voltar para todos os documentos</a>
  </div>

  <main class="doc">
    <article class="container">
      {{CONTENT}}
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>SB MARKETING LTDA, CNPJ 62.939.943/0001-31. R. Rodrigues Alves, 207, Conjunto Dom Pedro I, Manaus AM.</p>
      <p>Encarregada de Dados (DPO): Samara Gomes Benevides dos Santos, <a href="mailto:contas@persua.com.br">contas@persua.com.br</a>.</p>
    </div>
  </footer>

  <script>
    (function () {
      var themeBtn = document.getElementById('theme-toggle');
      if (themeBtn) {
        themeBtn.addEventListener('click', function () {
          var current = document.documentElement.getAttribute('data-theme') || 'light';
          var next = current === 'dark' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', next);
          try { localStorage.setItem('persua-theme', next); } catch (e) {}
        });
      }

      var menuBtn = document.getElementById('menu-toggle');
      var header = document.querySelector('.site-header');
      if (menuBtn && header) {
        menuBtn.addEventListener('click', function (e) {
          e.stopPropagation();
          var isOpen = header.classList.toggle('is-open');
          menuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
        document.addEventListener('click', function (e) {
          if (!header.classList.contains('is-open')) return;
          if (header.contains(e.target)) return;
          header.classList.remove('is-open');
          menuBtn.setAttribute('aria-expanded', 'false');
        });
      }
    })();
  </script>
</body>
</html>
